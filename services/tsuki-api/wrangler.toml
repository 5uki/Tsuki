name = "tsuki"
main = "entry/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── 公开配置 ─────────────────────────────────
# 所有配置项均可通过部署后访问 /setup 页面填写
# 高级用户也可通过 wrangler secret put 或 .dev.vars 设置（优先级更高）
[vars]
TSUKI_SESSION_TTL_MS = "1209600000"

# ── D1 数据库绑定 ────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "tsuki_db"
database_id = "placeholder-replace-with-actual-id"

# ── 定时任务（草稿定时发布）────────────────────
[triggers]
crons = ["*/15 * * * *"]
